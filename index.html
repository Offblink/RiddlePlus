<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Riddle++</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main-area">
  <div class="canvas-wrap" id="wrap">
    <canvas id="canvas"></canvas>
    <div class="toolbar toolbar-left">
      <button id="btnUndo" title="撤销 (Ctrl+Z)">↩</button>
    </div>
    <div class="undo-hint" id="undoHint">已撤销</div>
    <div class="toolbar">
      <button id="btnSettings" title="设置">⚙</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">写点什么吧…</span>
  </div>

  <button class="log-toggle" id="btnLog" title="日志">▷</button>
  <div class="log-panel" id="logPanel"></div>
</div>

<!-- settings sidebar -->
<div class="settings-sidebar" id="settingsPanel">
  <div class="settings-inner">
    <button class="btn-close-settings" id="btnClose">✕</button>
    <h2>⚙ 设置</h2>

    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="text">✎ 文字</button>
      <button class="settings-tab" data-tab="image">🎨 图像</button>
    </div>

    <div class="settings-tab-content active" id="tabText">
      <label>手写语言</label>
      <select id="langSelect">
        <option value="zh_CN">中文（简体）</option>
        <option value="zh_TW">中文（繁体）</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
      <label>回复字体</label>
      <select id="fontSelect">
        <option value="'Ma Shan Zheng', cursive">马善政</option>
        <option value="Caveat, cursive">Caveat</option>
        <option value="'KaiTi', 'STKaiti', '楷体', serif">楷体</option>
      </select>
      <label>字体大小</label>
      <select id="fontSizeSelect">
        <option value="20">20px</option><option value="24">24px</option>
        <option value="28" selected>28px</option><option value="32">32px</option>
        <option value="36">36px</option><option value="40">40px</option>
        <option value="48">48px</option>
      </select>
      <label>显示速度</label>
      <div class="speed-row">
        <button id="btnSpeedDown">−</button>
        <span class="speed-val" id="speedVal">200ms</span>
        <button id="btnSpeedUp">+</button>
      </div>
      <h3>文字 LLM</h3>
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-...">
      <label>API Base URL</label>
      <input id="apiBase" type="text" placeholder="https://api.deepseek.com">
      <label>Model</label>
      <input id="modelName" type="text" placeholder="deepseek-chat">
      <label>角色设定 (System Prompt)</label>
      <textarea id="systemPrompt" placeholder="你是一本有魔力的古老日记本..."></textarea>
    </div>

    <div class="settings-tab-content" id="tabImage">
      <h3>模式</h3>
      <div class="mode-row">
        <button id="btnModeAuto" class="active" title="先识别文字，失败则识图并尝试生图">🤖 自动</button>
        <button id="btnModeGen" title="始终识图并生成图像回复">🎨 始终生图</button>
      </div>
      <p class="mode-desc">自动：先试文字 → 失败则识图+生图<br>始终生图：直接识图 + AI 绘图</p>

      <h3>识图 Vision LLM</h3>
      <label>API Key</label>
      <input id="visionApiKey" type="password" placeholder="sk-...">
      <label>API Base URL</label>
      <input id="visionApiBase" type="text" placeholder="https://api.openai.com">
      <label>Model</label>
      <input id="visionModel" type="text" placeholder="gpt-4o">
      <h3>AI 绘图</h3>
      <label>API Base URL</label>
      <input id="imageGenApiBase" type="text" placeholder="https://api.openai.com">
      <label>API Key</label>
      <input id="imageGenApiKey" type="password" placeholder="sk-...">
      <label>Model</label>
      <input id="imageGenModel" type="text" placeholder="dall-e-3">
      <label>图片尺寸</label>
      <select id="imageGenSize">
        <option value="1024x1024">1024×1024</option>
        <option value="512x512">512×512</option>
        <option value="768x768">768×768</option>
      </select>
      <label>图像预览</label>
      <input id="fileImageInput" type="file" accept="image/*" style="font-size:12px;">
    </div>

    <button class="btn-save" id="btnSave">保存</button>
  </div>
</div>


<script src="config.js"></script>
<script src="js/canvas.js"></script>
<script src="js/recognition.js"></script>
<script src="js/binarize.js"></script>
<script src="js/api.js"></script>
<script src="js/animation.js"></script>
<script src="js/settings.js"></script>
<script src="js/main.js"></script>
</body>
</html>
