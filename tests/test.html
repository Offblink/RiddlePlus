<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Riddle++ Tests</title>
<style>
  body { font-family: 'Courier New', monospace; background: #1a1410; color: #d4c5b2; padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { color: #c9a96e; }
  .suite { margin: 12px 0; padding: 8px 12px; border-left: 3px solid #c9a96e; }
  .suite.pass { border-color: #5a5; }
  .suite.fail { border-color: #a55; }
  .case { padding: 3px 0; font-size: 14px; }
  .case.pass { color: #8a8; }
  .case.fail { color: #f55; }
  .case .msg { color: #a88; font-size: 12px; margin-left: 8px; }
  .summary { margin-top: 16px; font-size: 16px; }
  .summary.pass { color: #5a5; }
  .summary.fail { color: #f55; }
  .error-block { background: #300; padding: 8px; margin: 4px 0; color: #f88; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Riddle++ Test Harness</h1>
<div id="results"></div>

<script src="../js/canvas.js"></script>
<script src="../js/recognition.js"></script>
<script src="../js/binarize.js"></script>
<script src="../js/api.js"></script>
<script src="../js/animation.js"></script>
<script src="../js/settings.js"></script>

<script src="./settings.test.js"></script>
<script src="./binarize.test.js"></script>
<script src="./canvas.test.js"></script>
<script src="./recognition.test.js"></script>
<script src="./api.test.js"></script>

<script>
(function() {
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }

var results = document.getElementById('results');
var total = 0, passed = 0;

async function runSuite(name, runFn) {
  var el = document.createElement('div');
  el.className = 'suite';
  el.innerHTML = '<strong>' + name + '</strong>';
  results.appendChild(el);

  try {
    var cases = await runFn({ assert: assert });
    var p = 0, f = 0;
    for (var i = 0; i < cases.length; i++) {
      var c = cases[i];
      var div = document.createElement('div');
      if (c.pass) { div.className = 'case pass'; div.textContent = '✓ ' + c.name; p++; }
      else { div.className = 'case fail'; div.textContent = '✗ ' + c.name; if (c.message) { var s = document.createElement('span'); s.className = 'msg'; s.textContent = c.message; div.appendChild(s); } f++; }
      el.appendChild(div);
    }
    el.classList.add(f === 0 ? 'pass' : 'fail');
    return { pass: p, fail: f };
  } catch (e) {
    el.classList.add('fail');
    var div = document.createElement('div');
    div.className = 'error-block';
    div.textContent = 'ERROR: ' + e.message + '\n' + (e.stack || '');
    el.appendChild(div);
    return { pass: 0, fail: 1 };
  }
}

var suites = [
  ['settings.js', window.settingsRun],
  ['binarize.js', window.binarizeRun],
  ['canvas.js', window.canvasRun],
  ['recognition.js', window.recognitionRun],
  ['api.js', window.apiRun]
];

(async function() {
  for (var i = 0; i < suites.length; i++) {
    if (!suites[i][1]) continue;
    var r = await runSuite(suites[i][0], suites[i][1]);
    total += r.pass + r.fail;
    passed += r.pass;
  }
  var sum = document.createElement('div');
  sum.className = 'summary ' + (passed === total ? 'pass' : 'fail');
  sum.textContent = passed + '/' + total + ' passed';
  results.appendChild(sum);
})();
})();
</script>
</body>
</html>
